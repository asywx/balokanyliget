<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Balokány – Hírlevél</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#f5f5f5; }

    nav.topnav {
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      padding:1rem 2rem; background:#2f855a; color:white; position:fixed; width:100%; top:0; left:0;
    }

    nav ul { list-style:none; display:flex; gap:2rem; margin:0; padding:0; }
    nav a { color:white; text-decoration:none; }

    .container {
      max-width:500px; margin:8rem auto; background:white; padding:2rem;
      border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.06);
    }

    input { width:100%; padding:.6rem; margin-bottom:1rem; border-radius:6px; border:1px solid #ccc; }
    button { width:100%; padding:.75rem; border:none; border-radius:999px; background:#2f855a; color:white; }
    .message { margin-top:1rem; text-align:center; }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="logo">BALOKÁNY</div>
  <ul>
    <li><a href="index.html">HOME</a></li>
    <li><a href="hirlevel.html">HÍRLEVÉL</a></li>
    <li><a href="hirlevel-admin.html">HÍRLEVÉL ADMIN</a></li>
  </ul>
</nav>

<div class="container">
  <h1>Hírlevél feliratkozás</h1>

  <form id="newsletter-form">
    <input type="text" id="name" placeholder="Név" required>
    <input type="email" id="email" placeholder="E-mail cím" required>
    <button type="submit">Feliratkozom</button>
  </form>

  <div id="form-message" class="message"></div>
</div>

<script>
  const supabase = supabase.createClient(
    "https://swvryaeeccexhzlphhhj.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3dnJ5YWVlY2NleGh6bHBoaGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODY0MzYsImV4cCI6MjA4ODU2MjQzNn0.yZivicvBlXk3FjNt3nc-uEew1bTgePreYn9mpExKNSQ"
  );

  const form = document.getElementById("newsletter-form");
  const msg = document.getElementById("form-message");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const { error } = await supabase
      .from("subscribers")
      .insert({
        name: document.getElementById("name").value,
        email: document.getElementById("email").value
      });

    if (error) {
      msg.textContent = "Hiba történt.";
      msg.style.color = "red";
    } else {
      msg.textContent = "Sikeres feliratkozás!";
      msg.style.color = "#2f855a";
      form.reset();
    }
  });
</script>

</body>
</html>
